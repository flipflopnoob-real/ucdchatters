<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Chat!</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/normalize.css">
<link rel="stylesheet" href="css/skeleton.css">
<link rel="stylesheet" href="styles.css">

<link rel="icon" type="image/ico" href="favicon.ico">
<script src="/dist/index.js" type="module"></script>

<style>

html, body {
  height: 100%;
  margin: 0;
}

/* Layout */
.main-layout {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* Sidebar */

.sidebar {
  width: 20%;
  min-width: 180px;
  border-right: 1px solid #ddd;
  padding: 25px;
  box-sizing: border-box;
  background: #f9f9f9;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar li {
  margin: 18px 0;
}

.sidebar a {
  text-decoration: none;
  font-size: 1.25em;
  font-weight: 600;
  color: #333;
}

.sidebar a.home {
  font-size: 1.4em;
  font-weight: 700;
}

.sidebar a:hover {
  text-decoration: underline;
}

/* Chat area */

.chat-area {
  width: 80%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Scrollable messages */

#root {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* Chat container */

.chat {
  display: flex;
  flex-direction: column;
  min-height: 100%;
}

/* Word wrapping */

.chat *,
#root * {
  min-width: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* Input bar */

.chat-input {
  border-top: 1px solid #ddd;
  padding: 15px;
  background: white;
}

.chat-input form {
  display: flex;
  gap: 10px;
}

.chat-input input {
  flex: 1;
  margin-bottom: 0;
}

.chat-input button {
  white-space: nowrap;
}

</style>

</head>

<body>

<div class="main-layout">

  <!-- Sidebar -->

  <div class="sidebar">
    <ul>
      <li><a class="home" href="/home">Home</a></li>
      <li><a href="bored">Bored on Campus</a></li>
      <li><a href="events">Events</a></li>
      <li><a href="complain">Complaining</a></li>
    </ul>
  </div>

  <!-- Chat -->

  <div class="chat-area">

    <div id="root">
      <div class="chat container" id="messages">
        <!-- Messages render here -->
      </div>
    </div>

    <div class="chat-input">
      <form id="chatForm">
        <input
          type="text"
          name="content"
          placeholder="Hello! Type a message..."
          autocomplete="off"
        >
        <button type="submit">Send</button>
      </form>
    </div>

  </div>

</div>

<script>

/* scroll to bottom */

const root = document.getElementById("root");

function scrollToBottom(){
  root.scrollTop = root.scrollHeight;
}

/* load page at newest messages */

window.addEventListener("load", scrollToBottom);

/* scroll when sending message */

document.addEventListener("submit", function(event){

  const form = event.target;

  if (!(form instanceof HTMLFormElement)) return;
  if (!root.contains(form)) return;

  setTimeout(scrollToBottom, 50);

});

</script>

</body>
</html>
