<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Chat!</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/normalize.css" />
<link rel="stylesheet" href="css/skeleton.css" />
<link rel="stylesheet" href="styles.css" />

<link rel="icon" type="image/ico" href="favicon.ico" />
<script src="/dist/index.js" type="module"></script>

<style>

html, body {
  height: 100%;
  margin: 0;
}

/* Layout */

.main-layout {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* Sidebar */

.sidebar {
  width: 20%;
  min-width: 180px;
  border-right: 1px solid #ddd;
  padding: 25px;
  box-sizing: border-box;
  background: #f9f9f9;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar li {
  margin: 18px 0;
}

.sidebar a {
  text-decoration: none;
  font-size: 1.25em;
  font-weight: 600;
  color: #333;
}

.sidebar a.home {
  font-size: 1.4em;
  font-weight: 700;
}

.sidebar a:hover {
  text-decoration: underline;
}

/* Chat area */

.chat-area {
  width: 80%;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
}

/* Scroll container */

#root {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
  box-sizing: border-box;
}

/* Chat layout */

.chat {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

/* Messages area */

.chat-messages {
  flex: 1 0 auto;
  min-height: 0;
  padding-bottom: 140px; /* space for message bar */
}

/* Word wrapping */

.chat *,
#root * {
  min-width: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* Original message form pinned to bottom */

.chat form.row {
  position: sticky;
  bottom: 0;
  background: white;
  padding-top: 12px;
  padding-bottom: 35px; /* extra whitespace below textbox */
  border-top: 1px solid #ddd;

  display: flex;
  align-items: center;
  gap: 12px;
}

/* Input styling */

.chat input[type="text"] {
  flex: 1 1 auto;
  min-width: 0;
  margin-bottom: 0;
}

.chat button[type="submit"] {
  white-space: nowrap;
  margin-bottom: 0;
}

</style>
</head>

<body>

<div class="main-layout">

  <div class="sidebar">
    <ul>
      <li><a class="home" href="/home">Home</a></li>
      <li><a href="bored">Bored on Campus</a></li>
      <li><a href="events">Events</a></li>
      <li><a href="complain">Complaining</a></li>
    </ul>
  </div>

  <div class="chat-area">

    <div id="root">

      <div class="chat container">

        <div class="chat-messages" id="messages">
          <!-- Messages appear here -->
        </div>

        <form class="row">
          <input
            type="text"
            name="content"
            class="ten columns my-input-text"
            placeholder="Hello! Type a message..."
            autocomplete="off"
          >

          <button type="submit" class="send-message two columns">
            Send
          </button>
        </form>

      </div>

    </div>

  </div>

</div>

<script>

const root = document.getElementById("root");

/* scroll to newest message */

function scrollToBottom(){
  root.scrollTop = root.scrollHeight;
}

/* load page at newest messages */

window.addEventListener("load", () => {
  scrollToBottom();
  setTimeout(scrollToBottom, 200);
});

/* scroll after sending message */

document.addEventListener("submit", function(event){

  const form = event.target;

  if (!(form instanceof HTMLFormElement)) return;
  if (!root.contains(form)) return;

  setTimeout(scrollToBottom, 50);
  setTimeout(scrollToBottom, 200);

});

</script>

</body>
</html>
