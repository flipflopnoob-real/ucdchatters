<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Chat!</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/normalize.css" />
<link rel="stylesheet" href="css/skeleton.css" />
<link rel="stylesheet" href="styles.css" />

<link rel="icon" type="image/ico" href="favicon.ico" />
<script src="/dist/index.js" type="module"></script>

<style>

html, body {
  height: 100%;
  margin: 0;
}

/* Layout */

.main-layout {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* Sidebar */

.sidebar {
  width: 20%;
  min-width: 180px;
  border-right: 1px solid #ddd;
  padding: 25px;
  box-sizing: border-box;
  background: #f9f9f9;
}

/* Navigation list */

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar li {
  margin: 18px 0;
}

/* Links */

.sidebar a {
  text-decoration: none;
  font-size: 1.25em;
  font-weight: 600;
  color: #333;
}

/* Home slightly larger */

.sidebar a.home {
  font-size: 1.4em;
  font-weight: 700;
}

.sidebar a:hover {
  text-decoration: underline;
}

/* Chat area */
.chat-area {
  width: 80%;
  display: flex;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
  overflow: hidden;
}

/* root container */
.chat-area #root {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* main chat container */
.chat {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

/* message area (created dynamically by JS) */
.chat > div {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* keep input fixed at bottom */
.chat form {
  flex-shrink: 0;
}
</style>

</head>

<body>

<div class="main-layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <ul>
      <li><a class="home" href="/home">Home</a></li>
      <li><a href="bored">Bored on Campus</a></li>
      <li><a href="events">Events</a></li>
      <li><a href="complain">Complaining</a></li>
    </ul>
  </div>

  <!-- Chat UI -->
  <div class="chat-area">
    <div id="root">
      <div class="chat container">
        <form class="row">
          <input
            type="text"
            name="content"
            class="ten columns my-input-text"
            placeholder="Hello! Type a message..."
            autocomplete="off"
          >
          <button type="submit" class="send-message two columns">
            Send
          </button>
        </form>
      </div>
    </div>
  </div>

</div>

</body>
</html>
