<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chat!</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/normalize.css" />
<link rel="stylesheet" href="css/skeleton.css" />
<link rel="stylesheet" href="styles.css" />

<link rel="icon" type="image/ico" href="favicon.ico" />
<script src="/dist/index.js" type="module"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
}

.main-layout {
  display: flex;
  height: 100vh;
  width: 100%;
}

.sidebar {
  width: 20%;
  min-width: 180px;
  border-right: 1px solid #ddd;
  padding: 25px;
  box-sizing: border-box;
  background: #f9f9f9;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar li {
  margin: 18px 0;
}

.sidebar a {
  text-decoration: none;
  font-size: 1.25em;
  font-weight: 600;
  color: #333;
}

.sidebar a.home {
  font-size: 1.4em;
  font-weight: 700;
}

.sidebar a:hover {
  text-decoration: underline;
}

.chat-area {
  width: 80%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
  height: 100vh;
}

#root {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
}

.chat {
  display: flex;
  flex-direction: column;
  min-height: 100%;
}

/* message wrapping */
.chat *, #root * {
  min-width: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

/* INPUT BAR FIXED TO BOTTOM */
.chat-input-bar {
  border-top: 1px solid #ddd;
  padding: 12px 20px;
  background: white;
}

.chat-input-bar form {
  display: flex;
  gap: 12px;
  width: 100%;
}

.chat-input-bar input[type="text"] {
  flex: 1;
  min-width: 0;
  margin-bottom: 0;
}

.chat-input-bar button {
  white-space: nowrap;
}

</style>
</head>

<body>

<div class="main-layout">

  <div class="sidebar">
    <ul>
      <li><a class="home" href="/home">Home</a></li>
      <li><a href="bored">Bored on Campus</a></li>
      <li><a href="events">Events</a></li>
      <li><a href="complain">Complaining</a></li>
    </ul>
  </div>

  <div class="chat-area">

    <div id="root">
      <div class="chat container" id="messages"></div>
    </div>

    <!-- INPUT ALWAYS AT BOTTOM -->
    <div class="chat-input-bar">
      <form id="chatForm">
        <input
          type="text"
          name="content"
          placeholder="Hello! Type a message..."
          autocomplete="off"
        />
        <button type="submit">Send</button>
      </form>
    </div>

  </div>

</div>

<script>

const form = document.getElementById("chatForm");
const root = document.getElementById("root");

function scrollToBottom(){
  root.scrollTop = root.scrollHeight;
}

form.addEventListener("submit", () => {

  /* wait one frame so message renders */
  setTimeout(() => {
    scrollToBottom();
  }, 50);

});

/* also scroll when page first loads */
window.addEventListener("load", scrollToBottom);

</script>

</body>
</html>
